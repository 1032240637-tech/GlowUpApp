<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="color-scheme" content="dark" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GlowUp" />
  <meta name="application-name" content="GlowUp" />
  <meta name="description" content="GlowUp — Your premium self-improvement command center. Transform your health, mind, and lifestyle." />
  <meta name="robots" content="index, follow" />
  <title>GlowUp — Command Center</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
  <style>
    /* Critical CSS for instant load */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
    body{background:#08080d;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;overflow-x:hidden;min-height:100vh;min-height:100dvh}
    #app{min-height:100vh;min-height:100dvh;position:relative}
    .app-loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#08080d;z-index:9999;transition:opacity .5s}
    .app-loader svg{width:60px;height:60px;animation:pulse-glow 1.5s ease-in-out infinite}
    @keyframes pulse-glow{0%,100%{opacity:.4;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}}
  </style>
</head>
<body>
  <div id="app">
    <div class="app-loader" id="loader">
      <svg viewBox="0 0 60 60" fill="none">
        <circle cx="30" cy="30" r="28" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="120 60"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="60" y2="60"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
      </svg>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
  <script>
    // ── Service Worker Registration ──────────────────────
    // Registration is automatically injected by vite-plugin-pwa

    // ── Install Prompt (Add to Home Screen) ───────────────
    let _deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      _deferredInstallPrompt = e;
      // Expose globally so app can trigger install on user action
      window.__glowupInstall = async () => {
        if (!_deferredInstallPrompt) return;
        _deferredInstallPrompt.prompt();
        const { outcome } = await _deferredInstallPrompt.userChoice;
        _deferredInstallPrompt = null;
        return outcome;
      };
      // Dispatch event so app JS can show its own install nudge
      window.dispatchEvent(new CustomEvent('glowup:installable'));
    });

    window.addEventListener('appinstalled', () => {
      _deferredInstallPrompt = null;
      window.__glowupInstall = null;
    });
  </script>
</body>
</html>
